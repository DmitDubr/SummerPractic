BadRequest:
  description: Ошибка валидации запроса
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ErrorResponse'
      example:
        code: VALIDATION_ERROR
        message: Некорректные данные запроса
        details:
          - field: client.phone
            message: Телефон должен быть в формате +7 и содержать 10 цифр

Unauthorized:
  description: Требуется сессия клиента
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ErrorResponse'
      example:
        code: VALIDATION_ERROR
        message: Требуется авторизация

NotFound:
  description: Ресурс не найден
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ErrorResponse'
      example:
        code: VALIDATION_ERROR
        message: Ресурс не найден

Forbidden:
  description: Операция запрещена
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ErrorResponse'
      examples:
        slotRebookForbidden:
          summary: Повторная запись на отменённый слот (R-008, FR-018)
          value:
            code: SLOT_REBOOK_FORBIDDEN
            message: Запись на этот заезд недоступна
        bookingNotAttended:
          summary: Оценка до посещения (FR-026)
          value:
            code: BOOKING_NOT_ATTENDED
            message: Оценить можно после посещения заезда
        ratingPeriodExpired:
          summary: Срок оценки истёк (FR-026)
          value:
            code: RATING_PERIOD_EXPIRED
            message: Оценить можно в течение недели после заезда
        bookingNotActive:
          summary: Операция недоступна для неактивной брони
          value:
            code: BOOKING_NOT_ACTIVE
            message: Действие доступно только для активной записи

Conflict:
  description: Конфликт бизнес-правил
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ErrorResponse'
      examples:
        noSpots:
          summary: Мест нет / недостаточно карт (гонка, R-004)
          value:
            code: NO_SPOTS
            message: Места закончились
        slotCancelled:
          summary: Заезд отменён центром (FR-017)
          value:
            code: SLOT_CANCELLED
            message: Заезд отменён
        rentalUnavailable:
          summary: Прокат исчерпан — слот недоступен (FR-009)
          value:
            code: RENTAL_UNAVAILABLE
            message: Прокат на это время закончился
        alreadyCancelled:
          summary: Бронь уже отменена
          value:
            code: ALREADY_CANCELLED
            message: Запись уже отменена

ServerError:
  description: Внутренняя ошибка сервера
  content:
    application/json:
      schema:
        $ref: './schemas.yaml#/ErrorResponse'
      example:
        code: SERVER_ERROR
        message: Внутренняя ошибка сервера
