/programs:
  get:
    operationId: listPrograms
    tags:
      - programs
    summary: Справочник программ для фильтра
    description: |
      Активные типы программ для фильтра SCR-003 (FR-003): лепка, работа на круге.
      Multi-select OR внутри группы; `id` элементов передаётся в `programIds` при `listSlots`.
      Read-only — данные из Existing Backend (FR-026).
    responses:
      '200':
        description: Список программ для фильтра
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/ProgramListResponse'
            example:
              items:
                - id: 2c3d4e5f-6789-0123-4567-890abcdef012
                  typeName: Лепка
                  code: CLAY
                  isActive: true
                - id: 3d4e5f67-8901-2345-6789-0abcdef01234
                  typeName: Работа на круге
                  code: WHEEL
                  isActive: true
      '500':
        $ref: '../components/responses.yaml#/ServerError'
