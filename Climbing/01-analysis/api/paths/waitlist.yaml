/slots/{slotId}/waitlist:
  post:
    operationId: joinWaitlist
    tags:
      - waitlist
    summary: Вступить в лист ожидания
    description: |
      Встать в очередь на заполненный слот (SCR-012, Q 1.4).
      Один клиент — одна позиция на слот; действует лимит 1 запись/день (Q 1.3).
    parameters:
      - $ref: '../components/parameters.yaml#/SlotId'
    security:
      - ClientSession: []
      - {}
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yaml#/JoinWaitlistRequest'
    responses:
      '201':
        description: Клиент добавлен в очередь
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/WaitlistEntry'
            example:
              id: 5e6f7a8b-9c0d-1e2f-3a4b-5c6d7e8f9a0b
              slotId: 3fa85f64-5717-4562-b3fc-2c963f66afa6
              position: 2
              status: WAITING
              createdAt: '2026-07-03T11:00:00+03:00'
      '400':
        $ref: '../components/responses.yaml#/BadRequest'
      '409':
        $ref: '../components/responses.yaml#/Conflict'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

/waitlist/{waitlistEntryId}:
  get:
    operationId: getWaitlistEntry
    tags:
      - waitlist
    summary: Детали записи в листе ожидания
    description: Актуальная позиция в очереди для SCR-012 / SCR-008.
    security:
      - ClientSession: []
    parameters:
      - $ref: '../components/parameters.yaml#/WaitlistEntryId'
    responses:
      '200':
        description: Запись в листе ожидания
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/WaitlistEntry'
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/ServerError'

  delete:
    operationId: deleteWaitlistEntry
    tags:
      - waitlist
    summary: Покинуть лист ожидания
    description: Удаление записи из очереди (SCR-012, SCR-008).
    security:
      - ClientSession: []
    parameters:
      - $ref: '../components/parameters.yaml#/WaitlistEntryId'
    responses:
      '204':
        description: Запись удалена из очереди
      '401':
        $ref: '../components/responses.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses.yaml#/NotFound'
      '500':
        $ref: '../components/responses.yaml#/ServerError'
